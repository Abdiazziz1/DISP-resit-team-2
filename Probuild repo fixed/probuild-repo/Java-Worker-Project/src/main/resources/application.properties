# ProBuild Java Worker Project - Camunda 8 connection configuration
#
# NOTE: This is a starter/placeholder file. Fill in the values that match
# your actual Camunda 8 environment (local Camunda 8 Run, or SaaS) before
# running the application.

# Set to true to have CamundaDeploymentRunner deploy the BPMN + forms on startup
probuild.deployment.enabled=true

# --- For local Camunda 8 Run ---
# camunda.client.mode=self-managed
# camunda.client.zeebe.grpc-address=http://localhost:26500
# camunda.client.zeebe.rest-address=http://localhost:8080

# --- For Camunda 8 SaaS (uncomment and fill in if using SaaS instead) ---
# camunda.client.mode=saas
# camunda.client.cluster-id=YOUR_CLUSTER_ID
# camunda.client.region=YOUR_REGION
# camunda.client.auth.client-id=YOUR_CLIENT_ID
# camunda.client.auth.client-secret=YOUR_CLIENT_SECRET
